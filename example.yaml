# ==============================================================================
# Yuuka - Discord Gemini Secretary Bot Configuration
# ==============================================================================
# システム全体設定（全ユーザー共有）
# ユーザー別の設定（Gemini API Key/Model、Google OAuth等）は管理画面から設定します。
# ==============================================================================


# データベースファイルの保存パス
DB_PATH: "./data/yuuka.db"

# ==============================================================================
# 保存時暗号化シークレット (Encryption at Rest)
# ==============================================================================
# 保存時暗号化のマスターシークレット YUUKA_ENCRYPTION_SECRET 【必須】は、このファイルではなく
# 環境変数で設定します（.env ファイルまたは systemd の Environment 等）。
# .env.example を .env にコピーして設定してください。

# ==============================================================================
# 動作チューニング
# ==============================================================================
# 返信チェーン解決の最大遡り深度（無限ループ防止）
REPLY_CHAIN_MAX_DEPTH: 10

# Web管理画面セッションの有効期限（日数、スライディングウィンドウ延長）
SESSION_TTL_DAYS: 7

# 初期Adminロールを付与するDiscordユーザーID（カンマ区切り、任意。
# 未設定の場合は最初に登録したユーザーがAdminになります）
# ADMIN_DISCORD_IDS: ""

# Redis接続用URL (インメモリDBキャッシュ・セッション管理用)
REDIS_URL: "redis://127.0.0.1:6379"

# リマインダーをチェックする間隔 (cron式、デフォルトは毎分)
REMINDER_CRON: "* * * * *"

# ==============================================================================
# 管理画面サーバー設定 (Dashboard Settings)
# ==============================================================================
# 管理画面サーバーがリスンするポート
PORT: 7854

# 管理画面サーバーがバインドするホスト名
# デフォルトはローカルからの接続のみ受け付けます (127.0.0.1)。
# Cloudflare Tunnels や Docker 等のリバースプロキシを介して公開する場合は
# すべてのインターフェース ("0.0.0.0") に変更してください。
HOST: "127.0.0.1"

# ==============================================================================
# 招待コード (Invite Codes)
# ==============================================================================
# ユーザー登録に必須の招待コード。起動時にDBに投入されます（既存のものは重複投入されません）。
# 管理者が自由に追加・削除できます。各コードは1回限り使用可能です。
# ※ 必ず推測されにくい独自の値に変更してください。
INVITE_CODES:
  - change-me-to-random-code-1
  - change-me-to-random-code-2

# ==============================================================================
# Google OAuth2 システム共通設定 (System-wide Google OAuth)
# ==============================================================================
# カレンダーやドライブの同期に使用する、システム共通のデフォルト Google OAuth2 設定です。
# Google Cloud Console (https://console.cloud.google.com/) でOAuth クライアントIDを作成し、設定してください。
# ※ ユーザー自身が管理画面の個別設定で独自のクライアント情報（Client ID/Secret）を設定した場合は、そちらが最優先されます。
GOOGLE_CLIENT_ID: ""
GOOGLE_CLIENT_SECRET: ""

# ==============================================================================
# 外部公開ベースURL設定 (External Public Base URL)
# ==============================================================================
# Google OAuth 認証時のリダイレクト先となる、外部公開用のHTTPSベースURLです。
# Cloudflare Tunnels などのリバースプロキシで公開するドメインを指定します。
BASE_URL: "https://example.com"

# ==============================================================================
# 一般公開のプライバシーポリシー (Public Privacy Policy)
# ==============================================================================
# ログイン前画面や使い方ガイドに表示する一般公開プライバシーポリシーへのリンクです。
# 空欄の場合、リンクは表示されません。デフォルトはシステム内部の "/privacy" です。
PRIVACY_POLICY_URL: "/privacy"

# 一般公開の利用規約 (Public Terms of Use)
# ログイン前画面や使い方ガイドに表示する一般公開利用規約へのリンクです。
# 空欄の場合、リンクは表示されません。デフォルトはシステム内部の "/terms" です。
TERMS_URL: "/terms"

# ==============================================================================
# Google Search Console 所有権確認設定 (Google Site Verification)
# ==============================================================================
# Google OAuth2 の同意画面（ブランディング検証）などでホームページの所有権を確認するためのトークンです。
# Google Search Console から取得した HTML タグ検証用コード（例: googleXXXXXXXXXXXX）
# またはメタタグの content 属性の値を指定します。
# 空欄の場合、メタタグは挿入されません。
GOOGLE_SITE_VERIFICATION: ""
