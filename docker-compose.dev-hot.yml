# ==============================================================================
# Yuuka - ホットリロード開発用 compose
#
# TypeScript: tsx watch でファイル変更時に自動再起動
# Frontend: Svelte + Vite。このコンテナは API のみ担当。フロントはホストで
#           `pnpm dev:front`(Vite 5173) を併走させ、Vite proxy が /api・/ws/chat を
#           このコンテナの公開ポート(${HOST_PORT}=dev:7855) へ転送する（案A, 親書§5.7）。
#           dev API は BASE_URL 未設定(=http) 前提（§5.5: 未設定でないとセッション不達）。
# Rust バイナリ: イメージに内蔵（dist/bin/）。
#
# 起動:
#   deploy/instance.sh dev hot          # 推奨（シークレット注入 + ビルド済み確認）
#   deploy/instance.sh dev hot --build  # イメージ再ビルドしてから起動
# ==============================================================================

services:
  app:
    image: yuuka:dev-hot
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    init: true
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - NODE_ENV=development
      - YUUKA_ENCRYPTION_SECRET
      - YUUKA_ENCRYPTION_SECRET_NEW
      - TRUSTED_PROXIES
    volumes:
      - "${DATA_DIR:?set DATA_DIR in instance.env}:/app/data"
      - "${CONFIG_FILE:?set CONFIG_FILE in instance.env}:/app/config.yaml:ro"
      # ホットリロード: TypeScript ソースをマウント（API のホットリロード用）。
      # フロントは Vite(ホスト 5173) が担当するためここではマウントしない。
      # src/public マウントは P5 まで残置可（STATIC_DIR=src/public ロールバック検証用）。
      # Rust バイナリはイメージに焼き込み済みのため dist/bin/ マウント不要
      - ./src:/app/src
      # ただし src/rust_*/target はマウントから除外（anonymous volume でマスク）。
      # ホスト側に残った古い target/release/yuuka-* が browserService/synapseEngine の
      # 探索候補で優先され、イメージ内蔵の dist/bin/（事前ビルド版）より先に使われて
      # しまうのを防ぐ。これで Rust は常にイメージ内蔵バイナリで動く。
      - /app/src/rust_crawler/target
      - /app/src/rust_synapse/target
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${HOST_PORT:?set HOST_PORT in instance.env}:7854"
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
