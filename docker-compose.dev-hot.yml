# ==============================================================================
# Yuuka - ホットリロード開発用 compose
#
# TypeScript: tsx watch でファイル変更時に自動再起動
# Frontend (src/public/): ブラウザリロードで即反映（ビルド不要）
# Rust バイナリ: dist/bin/ を read-only マウント（事前 cargo build 済みを想定）
#
# 起動:
#   deploy/instance.sh dev hot          # 推奨（シークレット注入 + ビルド済み確認）
#   deploy/instance.sh dev hot --build  # イメージ再ビルドしてから起動
# ==============================================================================

services:
  app:
    image: yuuka:dev-hot
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    init: true
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      - NODE_ENV=development
      - YUUKA_ENCRYPTION_SECRET
      - YUUKA_ENCRYPTION_SECRET_NEW
      - TRUSTED_PROXIES
    volumes:
      - "${DATA_DIR:?set DATA_DIR in instance.env}:/app/data"
      - "${CONFIG_FILE:?set CONFIG_FILE in instance.env}:/app/config.yaml:ro"
      # ホットリロード: TypeScript ソース + フロントエンド (src/public/) をマウント
      - ./src:/app/src
      # Rust バイナリ（変更頻度低。事前 cargo build 済み前提）
      - ./dist/bin:/app/dist/bin:ro
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${HOST_PORT:?set HOST_PORT in instance.env}:7854"
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
